<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>운동체력 향상 활동 만들기</title>
<script>
  // 🔴 중요: 선생님의 구글 웹 앱 URL을 여기에 붙여넣으세요!
  const API_URL = "https://script.google.com/macros/s/AKfycbyqnmSGLbhVEMfeK5FpmTqwEoqWU9-6xwXjSubie_VOLCdmjl0DJZE5jQQoSRT-5FanpQ/exec";
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --dark:#1A1A2E;--blue:#0F3460;--yellow:#D4820A;--red:#C0392B;
    --teal:#0096B4;--green:#1E8449;--white:#fff;--light:#F0F4FF;
    --bg:#F5F7FF;--card:#fff;--border:#DDE3F0;--text:#1A1A2E;--muted:#6B7A99;
  }
  body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
  .hdr{background:linear-gradient(135deg,#1A1A2E 0%,#0F3460 100%);color:#fff;padding:16px 18px 12px;text-align:center;box-shadow:0 2px 16px rgba(15,52,96,.35)}
  .hdr h1{font-size:19px;font-weight:800;letter-spacing:-.4px}
  .stepbar{display:flex;align-items:center;justify-content:center;gap:4px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:0 1px 6px rgba(0,0,0,.06)}
  .snum{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #DDE3F0;color:#8892A4;background:#F5F7FF;transition:all .25s}
  .snum.act{background:#0F3460;border-color:#0F3460;color:#fff;box-shadow:0 0 0 3px rgba(15,52,96,.18)}
  .snum.done{background:#1E8449;border-color:#1E8449;color:#fff}
  .sline{width:22px;height:2px;background:#DDE3F0}
  .sline.done{background:#1E8449}
  .page{display:none;padding:14px 14px 24px;max-width:580px;margin:0 auto}
  .page.show{display:block}
  .sec-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:3px}
  .sec-sub{font-size:11px;color:var(--muted);margin-bottom:13px}
  .fc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fc{border-radius:16px;padding:18px 10px 14px;text-align:center;cursor:pointer;border:2.5px solid var(--border);transition:all .2s;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .fc.sel{transform:translateY(-2px);border-color:inherit}
  .eq-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .eq{border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;border:2.5px solid var(--border);transition:all .2s;background:var(--card);position:relative}
  .eq.sel{border-color:#0F3460;background:#EEF3FF;box-shadow:0 0 0 2px rgba(15,52,96,.15)}
  .eq svg{width:36px;height:36px;margin:0 auto 4px;display:block}
  .eq .enm{font-size:10px;font-weight:700;color:var(--text);line-height:1.2}
  .ck{display:none;position:absolute;top:3px;right:3px;width:16px;height:16px;background:#1E8449;border-radius:50%;color:#fff;font-size:9px;align-items:center;justify-content:center}
  .eq.sel .ck{display:flex}
  .eq-custom input{width:100%;border:none;background:transparent;text-align:center;font-size:10px;font-weight:700;outline:none}
  .act-box{background:var(--card);border-radius:14px;padding:15px;border:1px solid var(--border);margin-bottom:11px}
  .act-box h3{font-size:13px;font-weight:700;margin-bottom:9px;color:var(--muted)}
  .act-box textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px;font-size:13px;background:#F9FAFF;resize:none}
  .send-btn{width:100%;padding:14px;background:#00B4D8;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer}
  .nav{display:flex;gap:8px;margin-top:14px}
  .btn-back{flex:1;padding:13px;background:var(--card);border:1.5px solid var(--border);border-radius:10px}
  .btn-next{flex:2;padding:13px;background:#0F3460;color:#fff;border-radius:10px}
  .btn-next:disabled{background:#DDE3F0;color:#aaa}
  .tv-card{background:#fff;border-radius:13px;margin:9px 14px;padding:14px;border:1px solid var(--border)}
  .tv-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;color:#fff;margin-bottom:6px}
</style>
</head>
<body>

<div class="tv" id="tv" style="display:none">
  <div class="hdr"><h1>📋 제출 현황</h1></div>
  <div id="tv-list"></div>
</div>

<div id="sv">
  <div class="hdr"><h1>🏃 운동체력 향상 활동 만들기</h1><p>나만의 운동 프로그램을 직접 설계해요!</p></div>
  <div class="stepbar">
    <div class="snum act" id="d1">1</div><div class="sline" id="ln1"></div>
    <div class="snum" id="d2">2</div><div class="sline" id="ln2"></div>
    <div class="snum" id="d3">3</div><div class="sline" id="ln3"></div>
    <div class="snum" id="d4">4</div>
  </div>

  <div class="page show" id="p1">
    <div class="sec-title">⚡ 기르고 싶은 운동체력은?</div>
    <div class="sec-sub">오늘 활동의 핵심 목표를 골라주세요.</div>
    <div class="fc-grid">
      <div class="fc" onclick="selFit('pow',this)" style="color:var(--yellow);"><div style="font-size:30px">⚡</div><div style="font-weight:800">순발력</div></div>
      <div class="fc" onclick="selFit('agi',this)" style="color:var(--red);"><div style="font-size:30px">🏃</div><div style="font-weight:800">민첩성</div></div>
      <div class="fc" onclick="selFit('cor',this)" style="color:var(--teal);"><div style="font-size:30px">🎯</div><div style="font-weight:800">협응성</div></div>
      <div class="fc" onclick="selFit('bal',this)" style="color:var(--green);"><div style="font-size:30px">⚖️</div><div style="font-weight:800">평형성</div></div>
    </div>
    <div class="nav"><button class="btn-next" id="n1" onclick="go(2)" disabled>다음 단계 →</button></div>
  </div>

  <div class="page" id="p2">
    <div class="sec-title">🎒 사용할 교구를 골라요</div>
    <div class="sec-sub">여러 개를 중복해서 고를 수 있어요.</div>
    <div class="eq-grid" id="eqgrid"></div>
    <div class="nav"><button class="btn-back" onclick="go(1)">← 이전</button><button class="btn-next" id="n2" onclick="go(3)" disabled>다음 단계 →</button></div>
  </div>

  <div class="page" id="p3">
    <div class="sec-title">✏️ 활동을 직접 만들어요!</div>
    <div class="act-box"><h3>🏷️ 활동 이름</h3><textarea id="t-title" rows="1" oninput="chkS3()"></textarea></div>
    <div class="act-box"><h3>🎯 활동 목표</h3><textarea id="t-goal" rows="2"></textarea></div>
    <div class="act-box"><h3>📋 활동 방법</h3><textarea id="t-how" rows="4" oninput="chkS3()"></textarea></div>
    <div class="act-box"><h3>⚠️ 안전 주의사항</h3><textarea id="t-safe" rows="1"></textarea></div>
    <div class="nav"><button class="btn-back" onclick="go(2)">← 이전</button><button class="btn-next" id="n3" onclick="go(4)" disabled>전송 단계 →</button></div>
  </div>

  <div class="page" id="p4">
    <div class="act-box" id="send-box" style="background:linear-gradient(135deg,#1A1A2E,#0F3460); color:#fff;">
      <h3 style="color:#fff">📤 선생님께 전송하기</h3>
      <input id="sname" style="width:100%; padding:12px; margin:15px 0; border-radius:8px; border:none;" placeholder="이름을 입력하세요">
      <button class="send-btn" onclick="doSend()">✅ 제출하기</button>
    </div>
    <div id="succ-area" style="display:none; text-align:center; padding:30px">
      <div style="font-size:50px">🎉</div>
      <h2 style="margin-bottom:10px">전송 완료!</h2>
      <p style="color:var(--muted); font-size:14px">활동이 선생님께 잘 전달되었습니다.</p>
      <button onclick="resetForm()" style="margin-top:25px; padding:12px 24px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer; box-shadow:0 4px 10px rgba(15,52,96,0.2)">➕ 다른 활동 또 만들기</button>
    </div>
  </div>
</div>

<script>
const EQUIPMENTS = [
  {id:'cone', name:'꼬깔콘', icon:'📐'}, {id:'hoop', name:'훌라후프', icon:'⭕'}, {id:'rope', name:'줄넘기', icon:'➰'}, {id:'mat', name:'체육매트', icon:'🟦'},
  {id:'soccer', name:'축구공', icon:'⚽'}, {id:'basket', name:'농구공', icon:'🏀'}, {id:'voley', name:'배구공', icon:'🏐'}, {id:'disc', name:'디스크', icon:'💿'},
  {id:'vest', name:'팀조끼', icon:'🎽'}, {id:'marker', name:'접시콘', icon:'🔘'}, {id:'ladder', name:'뜀', icon:'🪜'}, {id:'bean', name:'콩주머니', icon:'💰'},
  {id:'watch', name:'초시계', icon:'⏱️'}, {id:'hurdle', name:'미니허들', icon:'🚧'}, 
  {id:'c1', name:'직접입력1', isCustom:true}, {id:'c2', name:'직접입력2', isCustom:true}
];

const FI={pow:{label:'순발력',c:'#D4820A'},agi:{label:'민첩성',c:'#C0392B'},cor:{label:'협응성',c:'#0096B4'},bal:{label:'평형성',c:'#1E8449'}};
let ST={fit:null, eq:[], c1:'', c2:''};

function buildEquip(){
  document.getElementById('eqgrid').innerHTML = EQUIPMENTS.map(e => {
    if(e.isCustom) return `<div class="eq" id="eq-${e.id}" onclick="toggleCustom('${e.id}')"><div class="ck">✓</div><div style="font-size:24px">✏️</div><div class="eq-custom"><input id="in-${e.id}" placeholder="직접입력" oninput="onCI('${e.id}',this)" onclick="event.stopPropagation()"></div></div>`;
    return `<div class="eq" id="eq-${e.id}" onclick="toggleEq('${e.id}')"><div class="ck">✓</div><div style="font-size:24px">${e.icon}</div><div class="enm">${e.name}</div></div>`;
  }).join('');
}

function toggleEq(id){
  const el = document.getElementById('eq-'+id); el.classList.toggle('sel');
  ST.eq = el.classList.contains('sel') ? [...ST.eq, id] : ST.eq.filter(x=>x!==id);
  chkEq();
}

function toggleCustom(id){ document.getElementById('eq-'+id).classList.toggle('sel'); chkEq(); }
function onCI(id, inp){ 
  if(id==='c1') ST.c1 = inp.value; else ST.c2 = inp.value; 
  document.getElementById('eq-'+id).classList.toggle('sel', !!inp.value); chkEq(); 
}

function chkEq(){
  const hasCustom = (document.getElementById('eq-c1').classList.contains('sel') && ST.c1) || (document.getElementById('eq-c2').classList.contains('sel') && ST.c2);
  document.getElementById('n2').disabled = (ST.eq.length === 0 && !hasCustom);
}

function selFit(type,el){
  document.querySelectorAll('.fc').forEach(c=>c.classList.remove('sel')); el.classList.add('sel');
  ST.fit=type; document.getElementById('n1').disabled=false;
}

function go(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById('p'+n).classList.add('show');
  for(let i=1;i<=4;i++){
    const d=document.getElementById('d'+i); d.className='snum'+(i<n?' done':i===n?' act':'');
    if(i<4) document.getElementById('ln'+i).className='sline'+(i<n?' done':'');
  }
  window.scrollTo(0,0);
}

function chkS3(){
  const t = document.getElementById('t-title').value.trim();
  const h = document.getElementById('t-how').value.trim();
  document.getElementById('n3').disabled = !(t && h);
}

async function doSend(){
  const name = document.getElementById('sname').value.trim();
  if(!name){alert('이름을 입력해주세요!'); return;}
  const eqNames = ST.eq.map(id => EQUIPMENTS.find(e=>e.id===id).name);
  if(ST.c1 && document.getElementById('eq-c1').classList.contains('sel')) eqNames.push(ST.c1);
  if(ST.c2 && document.getElementById('eq-c2').classList.contains('sel')) eqNames.push(ST.c2);

  const data = {
    name, fitLabel: FI[ST.fit].label, equipment: eqNames.join(', '),
    title: document.getElementById('t-title').value, goal: document.getElementById('t-goal').value,
    how: document.getElementById('t-how').value, safe: document.getElementById('t-safe').value,
    time: new Date().toLocaleString()
  };

  try {
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
    document.getElementById('send-box').style.display='none';
    document.getElementById('succ-area').style.display='block';
  } catch(e) { alert('전송 실패! 인터넷 연결을 확인해주세요.'); }
}

function resetForm() {
  // 데이터 및 입력창 초기화 (이름은 다음 활동을 위해 유지함)
  ST = {fit:null, eq:[], c1:'', c2:''};
  ['t-title', 't-goal', 't-how', 't-safe', 'in-c1', 'in-c2'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });

  // UI 상태 초기화
  document.querySelectorAll('.fc').forEach(c => c.classList.remove('sel'));
  document.querySelectorAll('.eq').forEach(e => e.classList.remove('sel'));
  
  document.getElementById('send-box').style.display = 'block';
  document.getElementById('succ-area').style.display = 'none';

  // 버튼 상태 초기화
  document.getElementById('n1').disabled = true;
  document.getElementById('n2').disabled = true;
  document.getElementById('n3').disabled = true;

  go(1); // 첫 페이지로 이동
}

async function loadTeacher(){
  try {
    const res = await fetch(API_URL); const data = await res.json();
    document.getElementById('tv-list').innerHTML = data.slice(1).reverse().map(r => `
      <div class="tv-card">
        <span class="tv-badge" style="background:#0F3460">${r[1]}</span> <b>${r[0]}</b>
        <div style="font-size:11px; color:#666; margin:5px 0;">🎒 ${r[2]} | 🕐 ${r[7]}</div>
        <div style="border-top:1px dashed #ddd; padding-top:8px"><b>${r[3]}</b></div>
        <div style="font-size:13px; color:#444; margin-top:5px; white-space:pre-wrap;">${r[5]}</div>
      </div>
    `).join('');
  } catch(e) {}
}

if(location.search.includes('teacher')) {
  document.getElementById('sv').style.display='none';
  document.getElementById('tv').style.display='block';
  loadTeacher();
} else { buildEquip(); }
</script>
</body>
</html>
